<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ultra Shooter</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
canvas { display:block; margin:auto; background:radial-gradient(circle,#111,#000); }
#ui { position:absolute; top:10px; left:50%; transform:translateX(-50%); color:white; font-family:Arial; font-size:20px; }
</style>
</head>
<body>
<div id="ui">ZQSD bouger | Souris tirer</div>
<canvas id="game" width="600" height="600"></canvas>
<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

let player, bullets, enemies, keys, score, gameOver;

function reset(){
 player = {x:300,y:300,size:15,speed:4};
 bullets = [];
 enemies = [];
 keys = {};
 score = 0;
 gameOver=false;
}

// joueur détaillé
function drawPlayer(){
 ctx.fillStyle="#00ffff";
 ctx.beginPath();
 ctx.arc(player.x, player.y, player.size, 0, Math.PI*2);
 ctx.fill();

 // glow
 ctx.strokeStyle="#00ffff";
 ctx.lineWidth=3;
 ctx.stroke();
}

// tirs
function drawBullets(){
 ctx.fillStyle="yellow";
 bullets.forEach(b=>{
   ctx.beginPath();
   ctx.arc(b.x,b.y,4,0,Math.PI*2);
   ctx.fill();
 });
}

function updateBullets(){
 bullets.forEach(b=>{
   b.x += b.dx;
   b.y += b.dy;
 });
 bullets = bullets.filter(b=>b.x>0 && b.x<600 && b.y>0 && b.y<600);
}

// ennemis
function spawnEnemy(){
 let edge = Math.floor(Math.random()*4);
 let x,y;
 if(edge===0){x=0;y=Math.random()*600}
 if(edge===1){x=600;y=Math.random()*600}
 if(edge===2){x=Math.random()*600;y=0}
 if(edge===3){x=Math.random()*600;y=600}

 enemies.push({x,y,size:12,speed:1.5});
}

function drawEnemies(){
 ctx.fillStyle="red";
 enemies.forEach(e=>{
   ctx.beginPath();
   ctx.arc(e.x,e.y,e.size,0,Math.PI*2);
   ctx.fill();
 });
}

function updateEnemies(){
 enemies.forEach(e=>{
   let dx = player.x - e.x;
   let dy = player.y - e.y;
   let dist = Math.sqrt(dx*dx + dy*dy);
   e.x += dx/dist * e.speed;
   e.y += dy/dist * e.speed;

   if(dist < player.size + e.size) gameOver=true;

   bullets.forEach((b,i)=>{
     let d = Math.hypot(b.x-e.x,b.y-e.y);
     if(d < e.size){
       enemies.splice(enemies.indexOf(e),1);
       bullets.splice(i,1);
       score++;
     }
   })
 });
}

// mouvements
function updatePlayer(){
 if(keys['z']) player.y -= player.speed;
 if(keys['s']) player.y += player.speed;
 if(keys['q']) player.x -= player.speed;
 if(keys['d']) player.x += player.speed;
}

function draw(){
 ctx.clearRect(0,0,600,600);
 drawPlayer();
 drawBullets();
 drawEnemies();

 ctx.fillStyle="white";
 ctx.fillText("Score: "+score,10,20);

 if(gameOver){
   ctx.font="40px Arial";
   ctx.fillText("GAME OVER",180,300);
   ctx.font="20px Arial";
   ctx.fillText("Clique pour rejouer",200,340);
 }
}

function loop(){
 if(!gameOver){
   if(Math.random()<0.02) spawnEnemy();
   updatePlayer();
   updateBullets();
   updateEnemies();
 }
 draw();
 requestAnimationFrame(loop);
}

// contrôles
window.addEventListener('keydown',e=>keys[e.key]=true);
window.addEventListener('keyup',e=>keys[e.key]=false);

c.addEventListener('click',e=>{
 if(gameOver){ reset(); return; }
 let rect=c.getBoundingClientRect();
 let mx=e.clientX-rect.left;
 let my=e.clientY-rect.top;
 let dx=mx-player.x;
 let dy=my-player.y;
 let dist=Math.sqrt(dx*dx+dy*dy);
 bullets.push({x:player.x,y:player.y,dx:dx/dist*6,dy:dy/dist*6});
});

reset();
loop();
</script>
</body>
</html>
