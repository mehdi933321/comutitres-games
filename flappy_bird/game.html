<!DOCTYPE html><html lang="fr"><head>  <meta charset="UTF-8">  <title>Flappy Bird</title>  <style>    body {      margin: 0;      overflow: hidden;      background: #70c5ce;      font-family: Arial;    }    canvas {      display: block;    }  </style></head><body><canvas id="game"></canvas><script>const canvas = document.getElementById("game");const ctx = canvas.getContext("2d");canvas.width = window.innerWidth;canvas.height = window.innerHeight;// ===== OISEAU =====let bird = {  x: 150,  y: 300,  velocity: 0,  gravity: 0.6,  lift: -10,  size: 20,  rotation: 0};// ===== TUYAUX =====let pipes = [];let frame = 0;let score = 0;let bestScore = 0;let gameOver = false;//function sounds(fichier_deson)const sounds = [  new Audio("bird1.mp3"),  new Audio("bird2.mp3")];function playFlap() {  let s = sounds[Math.floor(Math.random() * sounds.length)];  s.currentTime = 0;  s.play();}// ===== CREATION TUYAU =====function createPipe() {  let gap = 180;  let top = Math.random() * (canvas.height - gap - 200) + 50;  pipes.push({    x: canvas.width,    width: 70,    top: top,    gap: gap,    passed: false  });}// ===== DESSIN OISEAU =====function drawBird() {  ctx.save();  ctx.translate(bird.x, bird.y);  ctx.rotate(bird.rotation);  // corps  ctx.fillStyle = "#FFD700";  ctx.beginPath();  ctx.arc(0, 0, bird.size, 0, Math.PI * 2);  ctx.fill();  // aile animée  ctx.fillStyle = "#FFA500";  ctx.fillRect(-5, 0, 10, 15 + Math.sin(frame * 0.3) * 5);  // oeil  ctx.fillStyle = "white";  ctx.beginPath();  ctx.arc(6, -5, 6, 0, Math.PI * 2);  ctx.fill();  ctx.fillStyle = "black";  ctx.beginPath();  ctx.arc(8, -5, 3, 0, Math.PI * 2);  ctx.fill();  // bec  ctx.fillStyle = "orange";  ctx.fillRect(15, -5, 10, 5);  ctx.restore();}// ===== DESSIN TUYAUX =====function drawPipes() {  ctx.fillStyle = "#2ecc71";  pipes.forEach(p => {    // haut    ctx.fillRect(p.x, 0, p.width, p.top);    // bas    ctx.fillRect(p.x, p.top + p.gap, p.width, canvas.height);    // contour    ctx.strokeStyle = "#27ae60";    ctx.lineWidth = 4;    ctx.strokeRect(p.x, 0, p.width, p.top);    ctx.strokeRect(p.x, p.top + p.gap, p.width, canvas.height);  });}// ===== FOND =====let clouds = [];for (let i = 0; i < 5; i++) {  clouds.push({ x: Math.random() * canvas.width, y: Math.random() * 200 });}function drawBackground() {  // ciel  ctx.fillStyle = "#70c5ce";  ctx.fillRect(0, 0, canvas.width, canvas.height);  // nuages  ctx.fillStyle = "white";  clouds.forEach(c => {    ctx.beginPath();    ctx.arc(c.x, c.y, 30, 0, Math.PI * 2);    ctx.arc(c.x + 30, c.y + 10, 25, 0, Math.PI * 2);    ctx.fill();    c.x -= 0.5;    if (c.x < -50) c.x = canvas.width + 50;  });}// ===== UPDATE =====function update() {  if (gameOver) return;  bird.velocity += bird.gravity;  bird.y += bird.velocity;  // rotation réaliste  bird.rotation = Math.min(Math.PI / 4, bird.velocity * 0.05);  // collision sol/plafond  if (bird.y + bird.size > canvas.height || bird.y - bird.size < 0) {    endGame();  }  // création tuyaux  if (frame % 100 === 0) createPipe();  pipes.forEach(p => {    p.x -= 3;    // collision    if (      bird.x + bird.size > p.x &&      bird.x - bird.size < p.x + p.width &&      (bird.y - bird.size < p.top || bird.y + bird.size > p.top + p.gap)    ) {      endGame();    }    // score    if (!p.passed && p.x < bird.x) {      score++;      p.passed = true;    }  });  pipes = pipes.filter(p => p.x + p.width > 0);}// ===== SCORE =====function drawScore() {  ctx.fillStyle = "white";  ctx.font = "bold 40px Arial";  ctx.fillText("Score: " + score, 20, 60);  ctx.font = "20px Arial";  ctx.fillText("Best: " + bestScore, 20, 100);}// ===== GAME OVER =====function endGame() {  gameOver = true;  if (score > bestScore) bestScore = score;}// ===== RESET =====function reset() {  bird.y = 300;  bird.velocity = 0;  pipes = [];  score = 0;  gameOver = false;}// ===== LOOP =====function loop() {  drawBackground();  update();  drawPipes();  drawBird();  drawScore();  if (gameOver) {    ctx.fillStyle = "rgba(0,0,0,0.5)";    ctx.fillRect(0, 0, canvas.width, canvas.height);    ctx.fillStyle = "white";    ctx.font = "50px Arial";    ctx.fillText("GAME OVER", canvas.width / 2 - 150, canvas.height / 2);    ctx.font = "25px Arial";    ctx.fillText("Clique pour rejouer", canvas.width / 2 - 120, canvas.height / 2 + 50);  }  frame++;  requestAnimationFrame(loop);}loop();// ===== CONTROLES =====function jump() {  if (gameOver) {    reset();  } else {    bird.velocity = bird.lift;  }}window.addEventListener("click", jump);window.addEventListener("keydown", jump);const flapSound = new Audio("bird1.mp3");function jump() {  if (gameOver) {    reset();  } else {    bird.velocity = bird.lift;    // 🔊 jouer le son    flapSound.currentTime = 50; // reset pour rejouer direct	playFlap();    //flapSound.play();  }}</script></body></html>
